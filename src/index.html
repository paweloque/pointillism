<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pointilism</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ink: #000;
    --bg: #fff;
    --mid: #888;
    --line: 1px solid #000;
    --line-light: 1px solid #ddd;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    font-weight: 300;
    background: var(--bg);
    color: var(--ink);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* --- Sidebar --- */

  .sidebar {
    width: 300px;
    min-width: 300px;
    border-right: var(--line);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .logo {
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 24px 28px;
    border-bottom: var(--line);
  }

  .section {
    border-bottom: var(--line);
    padding: 20px 28px;
  }

  .section-title {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--mid);
    margin-bottom: 16px;
  }

  .control {
    margin-bottom: 16px;
  }

  .control:last-child {
    margin-bottom: 0;
  }

  .control-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }

  .control label {
    font-size: 0.8rem;
    font-weight: 400;
  }

  .control .value {
    font-size: 0.7rem;
    color: var(--mid);
    font-variant-numeric: tabular-nums;
  }

  /* --- Sliders --- */

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 1px;
    background: var(--ink);
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px;
    height: 10px;
    background: var(--bg);
    border: var(--line);
    border-radius: 50%;
    cursor: grab;
  }

  /* --- Preset buttons --- */

  .preset-row {
    display: flex;
    gap: 0;
  }

  .preset-btn {
    flex: 1;
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    font-weight: 400;
    padding: 8px 0;
    border: var(--line);
    border-right: none;
    background: var(--bg);
    cursor: pointer;
    text-transform: lowercase;
    transition: background 0.15s;
  }

  .preset-btn:last-child {
    border-right: var(--line);
  }

  .preset-btn:hover {
    background: #f5f5f5;
  }

  .preset-btn.active {
    background: var(--ink);
    color: var(--bg);
  }

  /* --- Color swatches --- */

  .color-row {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .color-swatch {
    width: 24px;
    height: 24px;
    border: var(--line);
    cursor: pointer;
  }

  .color-swatch.active {
    outline: 1px solid var(--ink);
    outline-offset: 3px;
  }

  /* --- Toggle switches --- */

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .toggle-row:last-child { margin-bottom: 0; }

  .toggle {
    width: 32px;
    height: 16px;
    border: var(--line);
    position: relative;
    cursor: pointer;
    border-radius: 8px;
  }

  .toggle::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 10px;
    height: 10px;
    background: var(--mid);
    border-radius: 50%;
    transition: all 0.15s;
  }

  .toggle.on::after {
    left: 18px;
    background: var(--ink);
  }

  /* --- Shape selector --- */

  .shape-row {
    display: flex;
    gap: 0;
  }

  .shape-btn {
    width: 36px;
    height: 36px;
    border: var(--line);
    border-right: none;
    background: var(--bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    color: var(--mid);
    transition: all 0.15s;
  }

  .shape-btn:last-child { border-right: var(--line); }
  .shape-btn:hover { color: var(--ink); }
  .shape-btn.active { background: var(--ink); color: var(--bg); }

  /* --- Buttons --- */

  .sidebar-footer {
    padding: 20px 28px;
    margin-top: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 400;
    padding: 12px;
    border: var(--line);
    background: var(--bg);
    cursor: pointer;
    text-transform: lowercase;
    letter-spacing: 0.1em;
    transition: all 0.15s;
    text-align: center;
  }

  .btn:hover {
    background: var(--ink);
    color: var(--bg);
  }

  .btn-primary {
    background: var(--ink);
    color: var(--bg);
  }

  .btn-primary:hover {
    background: var(--bg);
    color: var(--ink);
  }

  .particle-count {
    font-size: 0.65rem;
    color: var(--mid);
    text-align: center;
    padding-top: 8px;
    font-variant-numeric: tabular-nums;
  }

  /* --- Canvas area --- */

  .canvas-area {
    flex: 1;
    position: relative;
    background: #000;
    overflow: hidden;
  }

  canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  .upload-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 1;
  }

  .upload-hint {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: lowercase;
    color: #555;
    border: 1px solid #333;
    padding: 14px 28px;
    transition: border-color 0.15s, color 0.15s;
  }

  .upload-overlay:hover .upload-hint {
    color: #888;
    border-color: #555;
  }

  .canvas-area.dragover .upload-hint {
    color: #aaa;
    border-color: #888;
  }

  .upload-overlay.hidden {
    display: none;
  }

  .upload-error {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: #888;
    border: 1px solid #444;
    padding: 8px 20px;
    background: rgba(0,0,0,0.8);
    z-index: 2;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .upload-error.visible {
    opacity: 1;
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">pointilism</div>

  <div class="section">
    <div class="section-title">Preset</div>
    <div class="preset-row">
      <button class="preset-btn active" data-preset="subtle">subtle</button>
      <button class="preset-btn" data-preset="dense">dense</button>
      <button class="preset-btn" data-preset="dreamy">dreamy</button>
      <button class="preset-btn" data-preset="energy">energy</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Dots</div>
    <div class="control">
      <div class="control-header">
        <label>Density</label><span class="value" id="val-stride">3</span>
      </div>
      <input type="range" id="ctrl-stride" min="1" max="10" value="3">
    </div>
    <div class="control">
      <div class="control-header">
        <label>Size</label><span class="value" id="val-size">0.4</span>
      </div>
      <input type="range" id="ctrl-size" min="1" max="30" value="4">
    </div>
    <div class="control">
      <div class="control-header">
        <label>Scaling</label><span class="value" id="val-scaling">65%</span>
      </div>
      <input type="range" id="ctrl-scaling" min="0" max="100" value="65">
    </div>
    <div class="control">
      <div class="control-header">
        <label>Threshold</label><span class="value" id="val-threshold">1%</span>
      </div>
      <input type="range" id="ctrl-threshold" min="0" max="20" value="1">
    </div>
    <div class="control">
      <label style="margin-bottom:8px;display:block">Shape</label>
      <div class="shape-row">
        <button class="shape-btn active" data-shape="circle" title="Circle">&#9679;</button>
        <button class="shape-btn" data-shape="square" title="Square">&#9632;</button>
        <button class="shape-btn" data-shape="soft" title="Soft">&#10687;</button>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Color</div>
    <div class="control">
      <label style="margin-bottom:8px;display:block">Background</label>
      <div class="color-row">
        <div class="color-swatch active" data-color="#000" style="background:#000"></div>
        <div class="color-swatch" data-color="#111" style="background:#111"></div>
        <div class="color-swatch" data-color="#0a0a2e" style="background:#0a0a2e"></div>
        <div class="color-swatch" data-color="#eee" style="background:#eee"></div>
        <div class="color-swatch" data-color="#fff" style="background:#fff"></div>
      </div>
    </div>
    <div class="control">
      <div class="control-header">
        <label>Tint color</label>
        <input type="color" id="ctrl-tint-color" value="#f0b928" style="width:24px;height:24px;padding:0;border:var(--line);background:none;cursor:pointer">
      </div>
    </div>
    <div class="control">
      <div class="control-header">
        <label>Tint blend</label><span class="value" id="val-tint">off</span>
      </div>
      <input type="range" id="ctrl-tint" min="0" max="100" value="0">
    </div>
  </div>

  <div class="section">
    <div class="section-title">Interaction</div>
    <div class="control">
      <div class="control-header">
        <label>Radius</label><span class="value" id="val-radius">80px</span>
      </div>
      <input type="range" id="ctrl-radius" min="10" max="200" value="80">
    </div>
    <div class="control">
      <div class="control-header">
        <label>Strength</label><span class="value" id="val-strength">18</span>
      </div>
      <input type="range" id="ctrl-strength" min="1" max="50" value="18">
    </div>
  </div>

  <div class="section">
    <div class="section-title">Motion</div>
    <div class="toggle-row">
      <label style="font-size:0.8rem">Breathing</label>
      <div class="toggle" data-toggle="breathing"></div>
    </div>
    <div class="toggle-row">
      <label style="font-size:0.8rem">Sway</label>
      <div class="toggle" data-toggle="sway"></div>
    </div>
    <div class="toggle-row">
      <label style="font-size:0.8rem">Rise</label>
      <div class="toggle" data-toggle="rise"></div>
    </div>
  </div>

  <div class="sidebar-footer">
    <button class="btn btn-primary" id="btn-upload">upload image</button>
    <button class="btn" id="btn-export">export .html</button>
    <div class="particle-count" id="particle-count">0 particles</div>
  </div>
</div>

<div class="canvas-area" id="canvas-area">
  <canvas id="scene"></canvas>
  <div class="upload-overlay" id="upload-overlay">
    <div class="upload-hint">drop image or click to upload</div>
  </div>
  <div class="upload-error" id="upload-error"></div>
  <input type="file" id="file-input" accept="image/*" hidden>
</div>

<script type="module" src="./main.js"></script>
</body>
</html>
