<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pointilism</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ink: #000;
    --bg: #fff;
    --mid: #888;
    --line: 1px solid #000;
    --line-light: 1px solid #ddd;
  }

  [data-theme="dark"] {
    --ink: #fff;
    --bg: #111;
    --mid: #888;
    --line: 1px solid #fff;
    --line-light: 1px solid #333;
  }

  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --ink: #fff;
      --bg: #111;
      --mid: #888;
      --line: 1px solid #fff;
      --line-light: 1px solid #333;
    }
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    font-weight: 300;
    background: var(--bg);
    color: var(--ink);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* --- Sidebar --- */

  .sidebar {
    width: 300px;
    min-width: 300px;
    border-right: var(--line);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    background: var(--bg);
  }

  .logo {
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 24px 28px;
    border-bottom: var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .theme-toggle {
    font-size: 1rem;
    background: none;
    border: none;
    color: var(--mid);
    cursor: pointer;
    padding: 0;
    line-height: 1;
    transition: color 0.15s;
  }

  .theme-toggle:hover {
    color: var(--ink);
  }

  .section {
    border-bottom: var(--line);
    padding: 20px 28px;
  }

  .section-title {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--mid);
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .reset-link {
    font-size: 0.6rem;
    color: var(--mid);
    cursor: pointer;
    text-transform: lowercase;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: opacity 0.15s;
    border: none;
    background: none;
    font-family: inherit;
    padding: 0;
  }

  .section:hover .reset-link {
    opacity: 0.6;
  }

  .reset-link:hover {
    opacity: 1 !important;
  }

  .control {
    margin-bottom: 16px;
  }

  .control:last-child {
    margin-bottom: 0;
  }

  .control-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }

  .control label {
    font-size: 0.8rem;
    font-weight: 400;
  }

  .control .value {
    font-size: 0.7rem;
    color: var(--mid);
    font-variant-numeric: tabular-nums;
  }

  /* --- Sliders --- */

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 1px;
    background: var(--ink);
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px;
    height: 10px;
    background: var(--bg);
    border: var(--line);
    border-radius: 50%;
    cursor: grab;
  }

  /* --- Preset buttons --- */

  .preset-row {
    display: flex;
    gap: 0;
  }

  .preset-btn {
    flex: 1;
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    font-weight: 400;
    padding: 8px 0;
    border: var(--line);
    border-right: none;
    background: var(--bg);
    cursor: pointer;
    text-transform: lowercase;
    transition: background 0.15s;
  }

  .preset-btn:last-child {
    border-right: var(--line);
  }

  .preset-btn:hover {
    background: #f5f5f5;
  }

  .preset-btn.active {
    background: var(--ink);
    color: var(--bg);
  }

  /* --- Color swatches --- */

  .color-row {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .color-swatch {
    width: 24px;
    height: 24px;
    border: var(--line);
    cursor: pointer;
  }

  .color-swatch.active {
    outline: 1px solid var(--ink);
    outline-offset: 3px;
  }

  /* --- Toggle switches --- */

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .toggle-row:last-child { margin-bottom: 0; }

  .toggle {
    width: 32px;
    height: 16px;
    border: var(--line);
    position: relative;
    cursor: pointer;
    border-radius: 8px;
  }

  .toggle::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 10px;
    height: 10px;
    background: var(--mid);
    border-radius: 50%;
    transition: all 0.15s;
  }

  .toggle.on::after {
    left: 18px;
    background: var(--ink);
  }

  /* --- Shape selector --- */

  .shape-row {
    display: flex;
    gap: 0;
  }

  .shape-btn {
    width: 36px;
    height: 36px;
    border: var(--line);
    border-right: none;
    background: var(--bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    color: var(--mid);
    transition: all 0.15s;
  }

  .shape-btn:last-child { border-right: var(--line); }
  .shape-btn:hover { color: var(--ink); }
  .shape-btn.active { background: var(--ink); color: var(--bg); }

  /* --- Buttons --- */

  .sidebar-footer {
    padding: 20px 28px;
    margin-top: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .export-row {
    display: flex;
    gap: 8px;
  }

  .export-row .btn {
    flex: 1;
  }

  .btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 400;
    padding: 12px;
    border: var(--line);
    background: var(--bg);
    cursor: pointer;
    text-transform: lowercase;
    letter-spacing: 0.1em;
    transition: all 0.15s;
    text-align: center;
  }

  .btn:hover {
    background: var(--ink);
    color: var(--bg);
  }

  .btn-primary {
    background: var(--ink);
    color: var(--bg);
  }

  .btn-primary:hover {
    background: var(--bg);
    color: var(--ink);
  }

  .particle-count {
    font-size: 0.65rem;
    color: var(--mid);
    text-align: center;
    padding-top: 8px;
    font-variant-numeric: tabular-nums;
  }

  /* --- Canvas area --- */

  .canvas-area {
    flex: 1;
    position: relative;
    background: #000;
    overflow: hidden;
  }

  canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  .upload-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    cursor: pointer;
    z-index: 1;
  }

  .upload-tagline {
    text-align: center;
    max-width: 320px;
  }

  .upload-tagline p {
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    color: #555;
    line-height: 1.7;
  }

  .upload-hint {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: lowercase;
    color: #555;
    border: 1px solid #333;
    padding: 14px 28px;
    transition: border-color 0.15s, color 0.15s;
  }

  .upload-overlay:hover .upload-hint {
    color: #888;
    border-color: #555;
  }

  .canvas-area.dragover .upload-hint {
    color: #aaa;
    border-color: #888;
  }

  .upload-overlay.hidden {
    display: none;
  }

  .upload-error {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: #888;
    border: 1px solid #444;
    padding: 8px 20px;
    background: rgba(0,0,0,0.8);
    z-index: 2;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .upload-error.visible {
    opacity: 1;
  }

  .focal-point {
    position: absolute;
    width: 20px;
    height: 20px;
    transform: translate(-50%, -50%);
    cursor: grab;
    z-index: 1;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: auto;
  }

  .focal-point:hover,
  .focal-point.dragging {
    opacity: 1;
  }

  .canvas-area:hover .focal-point {
    opacity: 0.4;
  }

  .focal-point::before,
  .focal-point::after {
    content: '';
    position: absolute;
    background: #888;
  }

  .focal-point::before {
    width: 1px;
    height: 20px;
    left: 50%;
    top: 0;
  }

  .focal-point::after {
    width: 20px;
    height: 1px;
    top: 50%;
    left: 0;
  }

  @media (max-width: 1024px) {
    .focal-point { display: none; }
  }

  /* --- Medium: sidebar as overlay --- */

  .sidebar-toggle {
    display: none;
    position: absolute;
    top: 50%;
    left: 0;
    transform: translateY(-50%);
    z-index: 3;
    width: 24px;
    height: 48px;
    border: var(--line);
    border-left: none;
    background: var(--bg);
    cursor: pointer;
    font-size: 0.7rem;
    color: var(--mid);
    padding: 0;
  }

  .sidebar-toggle:hover { color: var(--ink); }

  @media (max-width: 1024px) and (min-width: 641px) {
    .sidebar {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      z-index: 10;
      transform: translateX(-100%);
      transition: transform 0.2s;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-toggle { display: block; }
    .sidebar.open ~ .canvas-area .sidebar-toggle { left: 300px; }
  }

  /* --- Small: bottom sheet --- */

  .mobile-fab {
    display: none;
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 44px;
    height: 44px;
    border: var(--line);
    background: var(--bg);
    color: var(--ink);
    font-size: 1.2rem;
    cursor: pointer;
    z-index: 3;
    padding: 0;
    line-height: 44px;
    text-align: center;
  }

  .bottom-sheet {
    display: none;
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 10;
    background: var(--bg);
    border-top: var(--line);
    padding: 20px 28px;
    transform: translateY(100%);
    transition: transform 0.2s;
  }

  .bottom-sheet.open {
    transform: translateY(0);
  }

  .bottom-sheet-close {
    font-family: 'Inter', sans-serif;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--mid);
    text-align: center;
    padding: 4px 0 14px;
    cursor: pointer;
    transition: color 0.15s;
  }

  .bottom-sheet-close:hover {
    color: var(--ink);
  }

  .bottom-sheet .control { margin-bottom: 14px; }
  .bottom-sheet .control:last-child { margin-bottom: 0; }

  @media (max-width: 640px) {
    .sidebar { display: none; }
    .sidebar-toggle { display: none; }
    .mobile-fab { display: block; }
    .bottom-sheet { display: block; }
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo"><span>pointilism</span><button class="theme-toggle" id="theme-toggle" title="toggle theme">&#9789;</button></div>

  <div class="section">
    <div class="section-title">Preset</div>
    <div class="preset-row">
      <button class="preset-btn active" data-preset="subtle">subtle</button>
      <button class="preset-btn" data-preset="dense">dense</button>
      <button class="preset-btn" data-preset="dreamy">dreamy</button>
      <button class="preset-btn" data-preset="energy">energy</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><span>Dots</span><button class="reset-link" data-reset="dots">reset</button></div>
    <div class="control">
      <div class="control-header">
        <label>Density</label><span class="value" id="val-stride">3</span>
      </div>
      <input type="range" id="ctrl-stride" min="1" max="10" value="3">
    </div>
    <div class="control">
      <div class="control-header">
        <label>Size</label><span class="value" id="val-size">0.4</span>
      </div>
      <input type="range" id="ctrl-size" min="1" max="30" value="4">
    </div>
    <div class="control">
      <div class="control-header">
        <label>Scaling</label><span class="value" id="val-scaling">65%</span>
      </div>
      <input type="range" id="ctrl-scaling" min="0" max="100" value="65">
    </div>
    <div class="control">
      <div class="control-header">
        <label>Threshold</label><span class="value" id="val-threshold">1%</span>
      </div>
      <input type="range" id="ctrl-threshold" min="0" max="20" value="1">
    </div>
    <div class="control">
      <label style="margin-bottom:8px;display:block">Shape</label>
      <div class="shape-row">
        <button class="shape-btn active" data-shape="circle" title="Circle">&#9679;</button>
        <button class="shape-btn" data-shape="square" title="Square">&#9632;</button>
        <button class="shape-btn" data-shape="soft" title="Soft">&#10687;</button>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><span>Color</span><button class="reset-link" data-reset="color">reset</button></div>
    <div class="control">
      <label style="margin-bottom:8px;display:block">Background</label>
      <div class="color-row">
        <div class="color-swatch active" data-color="#000" style="background:#000"></div>
        <div class="color-swatch" data-color="#111" style="background:#111"></div>
        <div class="color-swatch" data-color="#0a0a2e" style="background:#0a0a2e"></div>
        <div class="color-swatch" data-color="#eee" style="background:#eee"></div>
        <div class="color-swatch" data-color="#fff" style="background:#fff"></div>
      </div>
    </div>
    <div class="control">
      <div class="control-header">
        <label>Tint color</label>
        <input type="color" id="ctrl-tint-color" value="#f0b928" style="width:24px;height:24px;padding:0;border:var(--line);background:none;cursor:pointer">
      </div>
    </div>
    <div class="control">
      <div class="control-header">
        <label>Tint blend</label><span class="value" id="val-tint">off</span>
      </div>
      <input type="range" id="ctrl-tint" min="0" max="100" value="0">
    </div>
  </div>

  <div class="section">
    <div class="section-title"><span>Interaction</span><button class="reset-link" data-reset="interaction">reset</button></div>
    <div class="toggle-row">
      <label style="font-size:0.8rem">Enabled</label>
      <div class="toggle on" data-toggle="interactionEnabled"></div>
    </div>
    <div id="interaction-controls">
      <div class="control">
        <div class="control-header">
          <label>Radius</label><span class="value" id="val-radius">80px</span>
        </div>
        <input type="range" id="ctrl-radius" min="10" max="200" value="80">
      </div>
      <div class="control">
        <div class="control-header">
          <label>Strength</label><span class="value" id="val-strength">18</span>
        </div>
        <input type="range" id="ctrl-strength" min="1" max="50" value="18">
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><span>Motion</span><button class="reset-link" data-reset="motion">reset</button></div>
    <div class="preset-row" style="margin-bottom:14px">
      <button class="preset-btn" data-physics="off">off</button>
      <button class="preset-btn" data-physics="subtle">subtle</button>
      <button class="preset-btn" data-physics="animated">animated</button>
    </div>
    <div class="toggle-row">
      <label style="font-size:0.8rem">Breathing</label>
      <div class="toggle" data-toggle="breathing"></div>
    </div>
    <div class="control">
      <div class="control-header">
        <label>Intensity</label><span class="value" id="val-breathe-int">12%</span>
      </div>
      <input type="range" id="ctrl-breathe-int" min="0" max="30" value="12">
    </div>
    <div class="toggle-row">
      <label style="font-size:0.8rem">Sway</label>
      <div class="toggle" data-toggle="sway"></div>
    </div>
    <div class="control">
      <div class="control-header">
        <label>Intensity</label><span class="value" id="val-sway-int">100%</span>
      </div>
      <input type="range" id="ctrl-sway-int" min="0" max="300" value="100">
    </div>
    <div class="toggle-row">
      <label style="font-size:0.8rem">Rise</label>
      <div class="toggle" data-toggle="rise"></div>
    </div>
    <div class="control">
      <div class="control-header">
        <label>Speed</label><span class="value" id="val-rise-speed">100%</span>
      </div>
      <input type="range" id="ctrl-rise-speed" min="10" max="300" value="100">
    </div>
    <div class="toggle-row">
      <label style="font-size:0.8rem">Escape</label>
      <div class="toggle on" data-toggle="escape"></div>
    </div>
    <div class="toggle-row">
      <label style="font-size:0.8rem">Sparkle</label>
      <div class="toggle" data-toggle="sparkle"></div>
    </div>
    <div class="control">
      <div class="control-header">
        <label>Cycle speed</label><span class="value" id="val-sparkle-speed">100%</span>
      </div>
      <input type="range" id="ctrl-sparkle-speed" min="20" max="300" value="100">
    </div>
    <div class="toggle-row">
      <label style="font-size:0.8rem">Brownian</label>
      <div class="toggle" data-toggle="brownian"></div>
    </div>
    <div class="control">
      <div class="control-header">
        <label>Strength</label><span class="value" id="val-brownian-str">50%</span>
      </div>
      <input type="range" id="ctrl-brownian-str" min="10" max="200" value="50">
    </div>
  </div>

  <div class="section">
    <div class="section-title"><span>Sound</span><button class="reset-link" data-reset="sound">reset</button></div>
    <div class="toggle-row">
      <label style="font-size:0.8rem">Enabled</label>
      <div class="toggle" data-toggle="sonification"></div>
    </div>
    <div class="control">
      <div class="control-header">
        <label>Volume</label><span class="value" id="val-volume">50%</span>
      </div>
      <input type="range" id="ctrl-volume" min="0" max="100" value="50">
    </div>
  </div>

  <div class="section">
    <div class="section-title"><span>Text</span></div>
    <div class="control">
      <input type="text" id="ctrl-text" placeholder="type text here" style="width:100%;font-family:inherit;font-size:0.8rem;padding:8px;border:var(--line);background:var(--bg);color:var(--ink);outline:none">
    </div>
    <div class="control">
      <div class="control-header">
        <label>Font</label>
      </div>
      <select id="ctrl-text-font" style="width:100%;font-family:inherit;font-size:0.75rem;padding:6px;border:var(--line);background:var(--bg);color:var(--ink);cursor:pointer">
        <option value="Inter">inter</option>
        <option value="Georgia, serif">serif</option>
        <option value="monospace">monospace</option>
        <option value="Arial, sans-serif">sans-serif</option>
        <option value="Impact, sans-serif">impact</option>
      </select>
    </div>
    <div class="control">
      <div class="control-header">
        <label>Size</label><span class="value" id="val-text-size">64px</span>
      </div>
      <input type="range" id="ctrl-text-size" min="12" max="200" value="64">
    </div>
    <div class="control">
      <div class="control-header">
        <label>Y position</label><span class="value" id="val-text-y">50%</span>
      </div>
      <input type="range" id="ctrl-text-y" min="0" max="100" value="50">
    </div>
  </div>

  <div class="sidebar-footer">
    <button class="btn btn-primary" id="btn-upload">upload image</button>
    <div class="export-row">
      <button class="btn" id="btn-export">export .html</button>
      <button class="btn" id="btn-export-png">export .png</button>
    </div>
    <div class="particle-count" id="particle-count">0 particles</div>
  </div>
</div>

<button class="sidebar-toggle" id="sidebar-toggle">&#9776;</button>

<div class="canvas-area" id="canvas-area">
  <canvas id="scene"></canvas>
  <div class="focal-point" id="focal-point"></div>
  <div class="upload-overlay" id="upload-overlay">
    <div class="upload-hint">drop image or click to upload</div>
    <div class="upload-tagline">
      <p>turn any picture into a dotted html page.</p>
      <p>your image stays in your browser — nothing is uploaded.</p>
    </div>
  </div>
  <div class="upload-error" id="upload-error"></div>
  <input type="file" id="file-input" accept="image/*" hidden>
  <button class="mobile-fab" id="mobile-fab">&#9881;</button>
  <div class="bottom-sheet" id="bottom-sheet">
    <div class="bottom-sheet-close" id="bottom-sheet-close">&#10005; close</div>
    <div class="control">
      <div class="section-title" style="border:none;padding:0">Preset</div>
      <div class="preset-row">
        <button class="preset-btn active" data-preset="subtle">subtle</button>
        <button class="preset-btn" data-preset="dense">dense</button>
        <button class="preset-btn" data-preset="dreamy">dreamy</button>
        <button class="preset-btn" data-preset="energy">energy</button>
      </div>
    </div>
    <div class="control">
      <div class="section-title" style="border:none;padding:0">Motion</div>
      <div class="preset-row">
        <button class="preset-btn" data-physics="off">off</button>
        <button class="preset-btn" data-physics="subtle">subtle</button>
        <button class="preset-btn" data-physics="animated">animated</button>
      </div>
    </div>
    <div class="control">
      <label style="margin-bottom:8px;display:block">Background</label>
      <div class="color-row">
        <div class="color-swatch active" data-color="#000" style="background:#000"></div>
        <div class="color-swatch" data-color="#111" style="background:#111"></div>
        <div class="color-swatch" data-color="#0a0a2e" style="background:#0a0a2e"></div>
        <div class="color-swatch" data-color="#eee" style="background:#eee"></div>
        <div class="color-swatch" data-color="#fff" style="background:#fff"></div>
      </div>
    </div>
    <div class="toggle-row">
      <label style="font-size:0.8rem">Sound</label>
      <div class="toggle" data-toggle="sonification"></div>
    </div>
    <div class="control" style="margin-top:14px">
      <button class="btn btn-primary" id="btn-upload-m" style="width:100%">upload image</button>
    </div>
    <div class="control">
      <div class="export-row">
        <button class="btn" id="btn-export-m" style="width:100%">export .html</button>
        <button class="btn" id="btn-export-png-m" style="width:100%">export .png</button>
      </div>
    </div>
  </div>
</div>

<script type="module" src="./main.js"></script>
</body>
</html>
