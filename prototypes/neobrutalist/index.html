<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pointilism — Neobrutalist</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --yellow: #FFE14D;
    --pink: #FF6B9D;
    --blue: #4DAAFF;
    --green: #7AFF6B;
    --bg: #FFFEF0;
    --ink: #1a1a1a;
    --border: 3px solid var(--ink);
    --shadow: 5px 5px 0 var(--ink);
  }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--ink);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 340px;
    min-width: 340px;
    border-right: var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    background: var(--bg);
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 1.6rem;
    font-weight: 700;
    padding: 20px 24px;
    border-bottom: var(--border);
    background: var(--yellow);
    text-transform: uppercase;
    letter-spacing: -0.5px;
  }

  .logo span {
    display: inline-block;
    transform: rotate(-2deg);
    background: var(--pink);
    padding: 2px 8px;
    margin-left: 4px;
  }

  .section {
    border-bottom: var(--border);
    padding: 18px 24px;
  }

  .section-title {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 14px;
    background: var(--ink);
    color: var(--bg);
    display: inline-block;
    padding: 3px 10px;
  }

  .control {
    margin-bottom: 14px;
  }

  .control label {
    display: block;
    font-size: 0.85rem;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .slider-row .value {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    background: var(--yellow);
    border: 2px solid var(--ink);
    padding: 2px 8px;
    min-width: 40px;
    text-align: center;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 12px;
    background: var(--bg);
    border: 2px solid var(--ink);
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    background: var(--pink);
    border: 2px solid var(--ink);
    cursor: grab;
  }

  .color-row {
    display: flex;
    gap: 8px;
  }

  .color-swatch {
    width: 36px;
    height: 36px;
    border: var(--border);
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--ink);
    transition: transform 0.1s;
  }

  .color-swatch:hover {
    transform: translate(-2px, -2px);
    box-shadow: 5px 5px 0 var(--ink);
  }

  .color-swatch.active {
    outline: 3px solid var(--pink);
    outline-offset: 2px;
  }

  .preset-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .preset-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    padding: 8px 12px;
    border: var(--border);
    background: var(--bg);
    cursor: pointer;
    box-shadow: var(--shadow);
    text-transform: uppercase;
    font-weight: 700;
    transition: all 0.1s;
  }

  .preset-btn:hover {
    transform: translate(-2px, -2px);
    box-shadow: 7px 7px 0 var(--ink);
  }

  .preset-btn.active {
    background: var(--blue);
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--ink);
  }

  .btn-upload {
    width: 100%;
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    padding: 14px;
    border: var(--border);
    background: var(--green);
    cursor: pointer;
    box-shadow: var(--shadow);
    text-transform: uppercase;
    font-weight: 700;
    transition: all 0.1s;
    margin-bottom: 10px;
  }

  .btn-upload:hover {
    transform: translate(-2px, -2px);
    box-shadow: 7px 7px 0 var(--ink);
  }

  .btn-export {
    width: 100%;
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    padding: 14px;
    border: var(--border);
    background: var(--yellow);
    cursor: pointer;
    box-shadow: var(--shadow);
    text-transform: uppercase;
    font-weight: 700;
    transition: all 0.1s;
  }

  .btn-export:hover {
    transform: translate(-2px, -2px);
    box-shadow: 7px 7px 0 var(--ink);
  }

  .sidebar-footer {
    padding: 18px 24px;
    margin-top: auto;
  }

  /* Canvas area */
  .canvas-area {
    flex: 1;
    position: relative;
    background: #1a1a1a;
    overflow: hidden;
  }

  canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  .upload-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .upload-hint {
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    color: var(--bg);
    background: var(--ink);
    border: 3px solid var(--yellow);
    padding: 16px 28px;
    box-shadow: 6px 6px 0 var(--yellow);
    opacity: 0.7;
    text-transform: uppercase;
  }

  /* Toggle switch */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .toggle {
    width: 48px;
    height: 26px;
    border: 2px solid var(--ink);
    background: var(--bg);
    position: relative;
    cursor: pointer;
  }

  .toggle.on {
    background: var(--green);
  }

  .toggle::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 18px;
    height: 18px;
    background: var(--ink);
    transition: left 0.15s;
  }

  .toggle.on::after {
    left: 24px;
  }

  /* Shape buttons */
  .shape-row {
    display: flex;
    gap: 8px;
  }

  .shape-btn {
    width: 40px;
    height: 40px;
    border: var(--border);
    background: var(--bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 3px 3px 0 var(--ink);
    font-size: 1.2rem;
  }

  .shape-btn.active {
    background: var(--blue);
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--ink);
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">Pointil<span>ism</span></div>

  <div class="section">
    <div class="section-title">Presets</div>
    <div class="preset-grid">
      <button class="preset-btn active">Subtle</button>
      <button class="preset-btn">Dense</button>
      <button class="preset-btn">Dreamy</button>
      <button class="preset-btn">Energetic</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Dots</div>
    <div class="control">
      <label>Density (stride)</label>
      <div class="slider-row">
        <input type="range" min="1" max="10" value="3">
        <span class="value">3</span>
      </div>
    </div>
    <div class="control">
      <label>Size</label>
      <div class="slider-row">
        <input type="range" min="1" max="20" value="4">
        <span class="value">4</span>
      </div>
    </div>
    <div class="control">
      <label>Size scaling</label>
      <div class="slider-row">
        <input type="range" min="0" max="100" value="65">
        <span class="value">65%</span>
      </div>
    </div>
    <div class="control">
      <label>Shape</label>
      <div class="shape-row">
        <button class="shape-btn active" title="Circle">&#9679;</button>
        <button class="shape-btn" title="Square">&#9632;</button>
        <button class="shape-btn" title="Soft">&#10687;</button>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Color</div>
    <div class="control">
      <label>Background</label>
      <div class="color-row">
        <div class="color-swatch active" style="background:#1a1a1a"></div>
        <div class="color-swatch" style="background:#0a0a2e"></div>
        <div class="color-swatch" style="background:#2d1b00"></div>
        <div class="color-swatch" style="background:#f5f5f0"></div>
        <div class="color-swatch" style="background:#ffffff"></div>
      </div>
    </div>
    <div class="control">
      <label>Tint blend</label>
      <div class="slider-row">
        <input type="range" min="0" max="100" value="0">
        <span class="value">0%</span>
      </div>
    </div>
    <div class="control">
      <label>Threshold</label>
      <div class="slider-row">
        <input type="range" min="0" max="100" value="4">
        <span class="value">4%</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Mouse</div>
    <div class="control">
      <label>Radius</label>
      <div class="slider-row">
        <input type="range" min="10" max="200" value="80">
        <span class="value">80</span>
      </div>
    </div>
    <div class="control">
      <label>Strength</label>
      <div class="slider-row">
        <input type="range" min="0" max="100" value="50">
        <span class="value">50%</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Physics</div>
    <div class="control toggle-row">
      <label>Breathing</label>
      <div class="toggle on"></div>
    </div>
    <div class="control toggle-row">
      <label>Sway</label>
      <div class="toggle"></div>
    </div>
    <div class="control toggle-row">
      <label>Rise</label>
      <div class="toggle"></div>
    </div>
  </div>

  <div class="sidebar-footer">
    <button class="btn-upload">&#8593; Upload image</button>
    <button class="btn-export">&#8595; Export HTML</button>
  </div>
</div>

<div class="canvas-area">
  <canvas id="scene"></canvas>
  <div class="upload-overlay">
    <div class="upload-hint">Drop image here</div>
  </div>
</div>

<script>
// Simple dot demo
const canvas = document.getElementById('scene');
const ctx = canvas.getContext('2d');
let dots = [];
let mouse = { x: -1000, y: -1000 };

function resize() {
  const r = canvas.getBoundingClientRect();
  canvas.width = r.width;
  canvas.height = r.height;
  generateDots();
}

function generateDots() {
  dots = [];
  const stride = 8;
  for (let y = 0; y < canvas.height; y += stride) {
    for (let x = 0; x < canvas.width; x += stride) {
      const cx = canvas.width / 2, cy = canvas.height / 2;
      const dx = x - cx, dy = y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const maxDist = Math.sqrt(cx * cx + cy * cy);
      const br = Math.max(0, 1 - (dist / maxDist) * 1.2);
      if (br < 0.05 || Math.random() > br * 1.2 + 0.1) continue;
      const hue = (Math.atan2(dy, dx) * 180 / Math.PI + 360) % 360;
      dots.push({
        ox: x, oy: y, x, y, br,
        r: 120 + br * 135,
        g: 80 + br * 100 + Math.sin(hue * 0.017) * 40,
        b: 60 + br * 50,
        size: 0.8 + br * 2.5,
        alpha: 0.5 + br * 0.5,
        phase: Math.random() * Math.PI * 2
      });
    }
  }
}

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = e.clientX - r.left;
  mouse.y = e.clientY - r.top;
});
canvas.addEventListener('mouseleave', () => { mouse.x = -1000; mouse.y = -1000; });

function animate(t) {
  requestAnimationFrame(animate);
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const radius = 80;
  for (const d of dots) {
    const dx = d.ox - mouse.x, dy = d.oy - mouse.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < radius && dist > 0) {
      const force = (1 - dist / radius) * 20;
      d.x += (d.ox + dx / dist * force - d.x) * 0.15;
      d.y += (d.oy + dy / dist * force - d.y) * 0.15;
    } else {
      d.x += (d.ox - d.x) * 0.08;
      d.y += (d.oy - d.y) * 0.08;
    }
    const breathe = 0.9 + 0.1 * Math.sin(t * 0.002 + d.phase);
    ctx.globalAlpha = d.alpha * breathe;
    ctx.fillStyle = `rgb(${~~d.r},${~~d.g},${~~d.b})`;
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.size, 0, 6.2832);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

window.addEventListener('resize', resize);
resize();
requestAnimationFrame(animate);
</script>
</body>
</html>
