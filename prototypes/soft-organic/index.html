<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pointilism — Soft Organic</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #FBF8F4;
    --surface: #fff;
    --ink: #3D3535;
    --ink-light: #9A8F8F;
    --border: #EDE8E2;
    --peach: #FFB49A;
    --lavender: #C4B5ED;
    --mint: #A8E6CF;
    --sky: #A8D8EA;
    --rose: #F2A7B3;
    --shadow: 0 2px 16px rgba(61,53,53,0.06);
    --radius: 16px;
  }

  body {
    font-family: 'Nunito', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    height: 100vh;
    display: flex;
    overflow: hidden;
    font-weight: 300;
  }

  .sidebar {
    width: 320px;
    min-width: 320px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    box-shadow: var(--shadow);
    z-index: 1;
  }

  .sidebar::-webkit-scrollbar { width: 0; }

  .logo {
    font-size: 1.1rem;
    font-weight: 600;
    padding: 26px 28px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--peach), var(--lavender));
  }

  .section {
    border-bottom: 1px solid var(--border);
    padding: 20px 28px;
  }

  .section-title {
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--ink-light);
    margin-bottom: 16px;
  }

  .control { margin-bottom: 16px; }
  .control:last-child { margin-bottom: 0; }

  .control-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .control label { font-size: 0.85rem; font-weight: 400; }

  .control .value {
    font-size: 0.8rem;
    color: var(--ink-light);
    background: var(--bg);
    padding: 1px 10px;
    border-radius: 10px;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    background: var(--surface);
    border: 2px solid var(--lavender);
    border-radius: 50%;
    cursor: grab;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }

  /* Presets */
  .preset-row { display: flex; gap: 8px; flex-wrap: wrap; }

  .preset-btn {
    font-family: 'Nunito', sans-serif;
    font-size: 0.75rem;
    font-weight: 400;
    padding: 8px 16px;
    border: none;
    border-radius: 20px;
    background: var(--bg);
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.2s;
  }

  .preset-btn:hover { background: var(--border); color: var(--ink); }

  .preset-btn.active {
    background: linear-gradient(135deg, var(--peach), var(--lavender));
    color: #fff;
  }

  /* Color */
  .color-row { display: flex; gap: 10px; }

  .color-swatch {
    width: 30px;
    height: 30px;
    border-radius: 10px;
    border: 2px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
  }

  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.active { border-color: var(--lavender); box-shadow: 0 0 0 3px rgba(196,181,237,0.3); }

  /* Toggle */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .toggle-row:last-child { margin-bottom: 0; }

  .toggle {
    width: 40px;
    height: 22px;
    border-radius: 11px;
    background: var(--border);
    position: relative;
    cursor: pointer;
    transition: background 0.25s;
  }

  .toggle::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    transition: all 0.25s;
  }

  .toggle.on { background: var(--mint); }
  .toggle.on::after { left: 21px; }

  /* Shape */
  .shape-row { display: flex; gap: 8px; }

  .shape-btn {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--ink-light);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    transition: all 0.2s;
  }

  .shape-btn:hover { border-color: var(--lavender); }

  .shape-btn.active {
    background: var(--lavender);
    color: #fff;
    border-color: var(--lavender);
  }

  /* Buttons */
  .sidebar-footer {
    padding: 20px 28px;
    margin-top: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn {
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 14px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--peach), var(--lavender));
    color: #fff;
    box-shadow: 0 4px 16px rgba(196,181,237,0.3);
  }

  .btn-primary:hover { box-shadow: 0 4px 24px rgba(196,181,237,0.45); transform: translateY(-1px); }

  .btn-secondary {
    background: var(--bg);
    color: var(--ink);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { background: var(--border); }

  .particle-count {
    font-size: 0.7rem;
    color: var(--ink-light);
    text-align: center;
  }

  /* Canvas */
  .canvas-area {
    flex: 1;
    position: relative;
    background: #2A2025;
    overflow: hidden;
  }

  canvas { width: 100%; height: 100%; display: block; }

  .upload-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .upload-hint {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.35);
    border: 2px dashed rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 20px 36px;
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo"><div class="logo-dot"></div> pointilism</div>

  <div class="section">
    <div class="section-title">Preset</div>
    <div class="preset-row">
      <button class="preset-btn active">Subtle</button>
      <button class="preset-btn">Dense</button>
      <button class="preset-btn">Dreamy</button>
      <button class="preset-btn">Energetic</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Dots</div>
    <div class="control">
      <div class="control-header"><label>Density</label><span class="value">3</span></div>
      <input type="range" min="1" max="10" value="3">
    </div>
    <div class="control">
      <div class="control-header"><label>Size</label><span class="value">1.2</span></div>
      <input type="range" min="1" max="20" value="4">
    </div>
    <div class="control">
      <div class="control-header"><label>Scaling</label><span class="value">65%</span></div>
      <input type="range" min="0" max="100" value="65">
    </div>
    <div class="control">
      <div class="control-header"><label>Threshold</label><span class="value">4%</span></div>
      <input type="range" min="0" max="100" value="4">
    </div>
    <div class="control">
      <label style="margin-bottom:8px;display:block;font-size:0.85rem">Shape</label>
      <div class="shape-row">
        <button class="shape-btn active">&#9679;</button>
        <button class="shape-btn">&#9632;</button>
        <button class="shape-btn">&#10687;</button>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Color</div>
    <div class="control">
      <label style="margin-bottom:10px;display:block;font-size:0.85rem">Background</label>
      <div class="color-row">
        <div class="color-swatch active" style="background:#2A2025"></div>
        <div class="color-swatch" style="background:#1a1a2e"></div>
        <div class="color-swatch" style="background:#2d1b2e"></div>
        <div class="color-swatch" style="background:#f5f0eb"></div>
        <div class="color-swatch" style="background:#fff"></div>
      </div>
    </div>
    <div class="control">
      <div class="control-header"><label>Tint</label><span class="value">off</span></div>
      <input type="range" min="0" max="100" value="0">
    </div>
  </div>

  <div class="section">
    <div class="section-title">Interaction</div>
    <div class="control">
      <div class="control-header"><label>Radius</label><span class="value">80px</span></div>
      <input type="range" min="10" max="200" value="80">
    </div>
    <div class="control">
      <div class="control-header"><label>Strength</label><span class="value">50%</span></div>
      <input type="range" min="0" max="100" value="50">
    </div>
  </div>

  <div class="section">
    <div class="section-title">Motion</div>
    <div class="toggle-row"><label style="font-size:0.85rem">Breathing</label><div class="toggle on"></div></div>
    <div class="toggle-row"><label style="font-size:0.85rem">Sway</label><div class="toggle"></div></div>
    <div class="toggle-row"><label style="font-size:0.85rem">Rise</label><div class="toggle"></div></div>
  </div>

  <div class="sidebar-footer">
    <button class="btn btn-primary">Upload image</button>
    <button class="btn btn-secondary">Export .html</button>
    <div class="particle-count">12,847 particles</div>
  </div>
</div>

<div class="canvas-area">
  <canvas id="scene"></canvas>
  <div class="upload-overlay">
    <div class="upload-hint">Drop your image here</div>
  </div>
</div>

<script>
const canvas = document.getElementById('scene');
const ctx = canvas.getContext('2d');
let dots = [];
let mouse = { x: -1000, y: -1000 };

function resize() {
  const r = canvas.getBoundingClientRect();
  canvas.width = r.width;
  canvas.height = r.height;
  generateDots();
}

function generateDots() {
  dots = [];
  const stride = 7;
  for (let y = 0; y < canvas.height; y += stride) {
    for (let x = 0; x < canvas.width; x += stride) {
      const cx = canvas.width * 0.5, cy = canvas.height * 0.45;
      const dx = x - cx, dy = y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const maxDist = Math.min(canvas.width, canvas.height) * 0.42;
      const br = Math.max(0, 1 - dist / maxDist);
      if (br < 0.03 || Math.random() > br * 1.2 + 0.1) continue;
      const angle = Math.atan2(dy, dx);
      const hue = (angle + Math.PI) / (Math.PI * 2);
      dots.push({
        ox: x, oy: y, x, y, br,
        r: 180 + hue * 60 + br * 15,
        g: 120 + (1 - hue) * 80 + br * 50,
        b: 160 + hue * 50 + br * 40,
        size: 0.5 + br * 2.2,
        alpha: 0.35 + br * 0.6,
        phase: Math.random() * Math.PI * 2
      });
    }
  }
}

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = e.clientX - r.left;
  mouse.y = e.clientY - r.top;
});
canvas.addEventListener('mouseleave', () => { mouse.x = -1000; mouse.y = -1000; });

function animate(t) {
  requestAnimationFrame(animate);
  ctx.fillStyle = '#2A2025';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const radius = 90;
  for (const d of dots) {
    const dx = d.ox - mouse.x, dy = d.oy - mouse.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < radius && dist > 0) {
      const force = (1 - dist / radius) * 20;
      d.x += (d.ox + dx / dist * force - d.x) * 0.1;
      d.y += (d.oy + dy / dist * force - d.y) * 0.1;
    } else {
      d.x += (d.ox - d.x) * 0.05;
      d.y += (d.oy - d.y) * 0.05;
    }
    const breathe = 0.9 + 0.1 * Math.sin(t * 0.0012 + d.phase);
    ctx.globalAlpha = d.alpha * breathe;
    ctx.fillStyle = `rgb(${~~d.r},${~~d.g},${~~d.b})`;
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.size, 0, 6.2832);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

window.addEventListener('resize', resize);
resize();
requestAnimationFrame(animate);
</script>
</body>
</html>
